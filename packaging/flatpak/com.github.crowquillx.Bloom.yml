app-id: com.github.crowquillx.Bloom
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: bloom
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --env=BLOOM_FLATPAK=1
modules:
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=true
      - -Dbuild-date=false
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dmanpage-build=disabled
      - -Dtests=false
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
  - name: bloom
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_TESTING=OFF
      - -DBLOOM_BUILD_CHANNEL=stable
    sources:
      - type: dir
        path: ../..
    post-install:
      - mv /app/bin/Bloom /app/bin/bloom
