name: CI and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CACHIX_CACHE: crowquillx-bloom
  BLOOM_BUILD_JOBS: '2'

jobs:
  nix:
    name: Nix checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}
      - run: nix flake check --print-build-logs --option max-jobs 1 --option cores 2
      - run: nix build .#bloom --print-build-logs --option max-jobs 1 --option cores 2

  quarantined-tests:
    name: Quarantined tests
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true
      - name: Run environment-sensitive tests
        run: |
          nix develop --command bash -c '
            cmake -S . -B build-quarantine -G Ninja -DBUILD_TESTING=ON
            cmake --build build-quarantine --parallel 2 --target \
              SeriesDetailsCacheTest VisualRegressionTest
            QT_QPA_PLATFORM=offscreen ctest --test-dir build-quarantine \
              --output-on-failure --tests-regex "^(SeriesDetailsCacheTest|VisualRegressionTest)$"
          '

  portable-linux:
    name: Portable Linux artifacts
    runs-on: ubuntu-24.04
    needs: nix
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Build AppImage, deb, and tarball
        env:
          BLOOM_BUILD_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/v') && 'stable' || 'dev' }}
          BLOOM_BUILD_ID: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
          BLOOM_GIT_SHA: ${{ github.sha }}
        run: nix run .#package-linux -- --output dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/SHA256SUMS-linux-x86_64.txt
          if-no-files-found: error

  flatpak:
    name: Flatpak artifact
    runs-on: ubuntu-24.04
    needs: nix
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Build Flatpak bundle
        run: nix run .#package-flatpak -- --output dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Flatpak
          path: |
            dist/*.flatpak
            dist/SHA256SUMS-flatpak-x86_64.txt
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
      - name: Read dependency pins
        shell: pwsh
        run: |
          $deps = Get-Content packaging/dependencies.json -Raw | ConvertFrom-Json
          "BLOOM_QT_VERSION=$($deps.qt.version)" >> $env:GITHUB_ENV
          "BLOOM_QT_ARCH=$($deps.qt.windows_arch)" >> $env:GITHUB_ENV
      - name: Cache Qt SDK
        id: cache-qt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.tool_cache }}\Qt
          key: qt-${{ env.BLOOM_QT_VERSION }}-${{ env.BLOOM_QT_ARCH }}-${{ hashFiles('packaging/dependencies.json') }}
      - name: Install Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # aqtinstall 3.3.0 cannot install Qt 6.11+ on Windows (repo layout
          # changed); use the fix on master until 3.3.1 is released.
          python -m pip install "aqtinstall @ git+https://github.com/miurahr/aqtinstall.git@bbfb1f7c0590b9eb3fa91356e75bb64fb15d3643" "py7zr==1.0.*"
          python -m aqt install-qt -O "$env:RUNNER_TOOL_CACHE\Qt" windows desktop `
            "$env:BLOOM_QT_VERSION" "$env:BLOOM_QT_ARCH" `
            -m qtmultimedia qtshadertools qtimageformats qt5compat
      - name: Configure Qt environment
        shell: pwsh
        run: |
          # aqtinstall installs to <outputdir>/<version>/<arch-dir>/ where
          # <arch-dir> drops the "win64_" prefix from the package selector.
          $qtArchDir = $env:BLOOM_QT_ARCH -replace '^win64_', ''
          $qtRoot = Join-Path $env:RUNNER_TOOL_CACHE "Qt\$env:BLOOM_QT_VERSION\$qtArchDir"
          if (-not (Test-Path "$qtRoot\lib\cmake\Qt6\Qt6Config.cmake")) {
            throw "Qt6Config.cmake not found under $qtRoot"
          }
          "QT_ROOT_DIR=$qtRoot" >> $env:GITHUB_ENV
          "CMAKE_PREFIX_PATH=$qtRoot" >> $env:GITHUB_ENV
          "$qtRoot\bin" >> $env:GITHUB_PATH
      - name: Install build tools
        shell: pwsh
        run: choco install ninja 7zip -y --no-progress
      - name: Build and install
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio installation with MSVC x64 tools was found" }
          $devShell = Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          if (-not (Test-Path $devShell)) { throw "VS DevShell module not found at $devShell" }
          Import-Module $devShell
          Enter-VsDevShell -VsInstallPath $vsPath -Arch x64 -HostArch x64 -SkipAutomaticLocation
          if (-not (Get-Command cl -ErrorAction SilentlyContinue)) { throw "MSVC compiler (cl.exe) is not on PATH after Enter-VsDevShell" }
          ./scripts/build.ps1 -BuildDir build-windows -InstallDir install-windows `
            -QtDir "$env:QT_ROOT_DIR" -Generator Ninja -Clean
      - name: Package portable build
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -InstallDir install-windows `
            -OutputDir Bloom-Windows -QtDir "$env:QT_ROOT_DIR"
          Compress-Archive Bloom-Windows/* Bloom-Windows.zip -Force
      - uses: ./.github/actions/setup-nsis
      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Windows
          path: |
            Bloom-Windows.zip
            Bloom-Setup-*.exe
          if-no-files-found: error

  release:
    name: Publish release artifacts
    runs-on: ubuntu-24.04
    needs: [portable-linux, flatpak, windows]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: Bloom-*
          path: release-assets
          merge-multiple: true
      - name: Generate combined checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 |
            sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.flatpak
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.exe
      - name: Select release tag
        id: release
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            git tag -f dev-latest "$GITHUB_SHA"
            git push origin refs/tags/dev-latest --force
            echo "tag=dev-latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
          overwrite_files: true
          files: release-assets/*
          fail_on_unmatched_files: true
      - name: Generate Windows update manifest
        id: manifest
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          INSTALLER="$(find release-assets -maxdepth 1 -name 'Bloom-Setup-*.exe' -printf '%f\n' | head -1)"
          PORTABLE="Bloom-Windows.zip"
          INSTALLER_HASH="$(sha256sum "release-assets/$INSTALLER" | cut -d' ' -f1)"
          PORTABLE_HASH="$(sha256sum "release-assets/$PORTABLE" | cut -d' ' -f1)"
          CHANNEL="${{ steps.release.outputs.tag == 'dev-latest' && 'dev' || 'stable' }}"
          BUILD_ID="${{ steps.release.outputs.tag == 'dev-latest' && github.sha || '' }}"
          BUILD_ID="${BUILD_ID:-$VERSION}"
          python3 scripts/generate-update-manifest.py \
            --channel "$CHANNEL" \
            --version "$VERSION" \
            --build-id "$BUILD_ID" \
            --release-tag "${{ steps.release.outputs.tag }}" \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --notes-file RELEASE_NOTES.md \
            --installer-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.release.outputs.tag }}/$INSTALLER" \
            --installer-filename "$INSTALLER" \
            --installer-sha256 "$INSTALLER_HASH" \
            --portable-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.release.outputs.tag }}/$PORTABLE" \
            --portable-filename "$PORTABLE" \
            --portable-sha256 "$PORTABLE_HASH" \
            --minimum-supported-version "$VERSION" \
            --output "$CHANNEL.json"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
      - name: Publish update manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" manifest-repo
          cd manifest-repo
          if git ls-remote --exit-code --heads origin update-manifests >/dev/null 2>&1; then
            git checkout update-manifests
          else
            git checkout --orphan update-manifests
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "../${{ steps.manifest.outputs.channel }}.json" .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.manifest.outputs.channel }}.json"
          git commit -m "chore: update ${{ steps.manifest.outputs.channel }} manifest" || true
          git push origin update-manifests
