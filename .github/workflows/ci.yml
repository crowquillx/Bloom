name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.clang-tidy'
      - '.clangd'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.clang-tidy'
      - '.clangd'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Qt SDK
        id: cache_qt_windows
        uses: actions/cache@v5
        with:
          path: ${{ runner.workspace }}/Qt
          key: windows-qt-6.10.0-win64_msvc2022_64-qtmultimedia-qtshadertools-qtimageformats-qt5compat-v1

      - name: Install aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.3.*" "py7zr==1.0.*"

      - name: Install Qt
        if: steps.cache_qt_windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -m aqt install-qt -O "$env:RUNNER_WORKSPACE\Qt" windows desktop 6.10.0 win64_msvc2022_64 -m qtmultimedia qtshadertools qtimageformats qt5compat

      - name: Export Qt environment
        shell: pwsh
        run: |
          $qtVersionRoot = Join-Path $env:RUNNER_WORKSPACE "Qt\6.10.0"
          $qtRoot = Get-ChildItem -Path $qtVersionRoot -Directory |
            Where-Object { Test-Path (Join-Path $_.FullName "bin\qmake.exe") } |
            Select-Object -First 1

          if (-not $qtRoot) {
            Write-Error "Could not locate Qt root under $qtVersionRoot"
            exit 1
          }

          $qtRootPath = $qtRoot.FullName
          "QT_ROOT_DIR=$qtRootPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$qtRootPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_PLUGIN_PATH=$(Join-Path $qtRootPath 'plugins')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QML2_IMPORT_PATH=$(Join-Path $qtRootPath 'qml')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $qtRootPath 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure MSVC environment
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere.exe not found at $vswhere"
            exit 1
          }

          $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installationPath) {
            Write-Error "Could not find a Visual Studio installation with C++ tools"
            exit 1
          }

          $vsDevCmd = Join-Path $installationPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            Write-Error "VsDevCmd.bat not found at $vsDevCmd"
            exit 1
          }

          $envDump = & cmd.exe /s /c "call `"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to initialize the MSVC developer environment"
            exit 1
          }

          foreach ($line in $envDump) {
            if ($line -match '^[^=][^=]*=.*$') {
              $line | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Install Ninja
        run: choco install ninja -y
        shell: pwsh

      - name: Install 7zip
        run: choco install 7zip -y
        shell: pwsh

      - name: Fetch libmpv SDK
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ghHeaders = @{
            "User-Agent" = "Bloom-CI"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Authorization" = "Bearer $env:GITHUB_TOKEN"
          }
          Write-Host "Using github.token for authenticated GitHub API requests."

          $release = $null
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" -Headers $ghHeaders
              break
            } catch {
              if ($attempt -eq 3) { throw }
              $sleepSec = 5 * $attempt
              Write-Warning "GitHub API request failed (attempt $attempt/3). Retrying in $sleepSec seconds..."
              Start-Sleep -Seconds $sleepSec
            }
          }

          $asset = $release.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.(7z|zip)$' } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find mpv-dev-x86_64 SDK asset in latest shinchiro/mpv-winbuild-cmake release."
            exit 1
          }

          $downloadPath = Join-Path $PWD $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $downloadPath -Headers $ghHeaders

          $extractRoot = Join-Path $PWD "third_party\mpv"
          if (Test-Path $extractRoot) { Remove-Item -Recurse -Force $extractRoot }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null

          if ($asset.name.ToLower().EndsWith(".zip")) {
            Expand-Archive -Path $downloadPath -DestinationPath $extractRoot -Force
          } else {
            & 7z x $downloadPath "-o$extractRoot" -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to extract $($asset.name) with 7z."
              exit 1
            }
          }

          $mpvRootCandidate = Get-ChildItem -Path $extractRoot -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "include\mpv\client.h") } |
            Select-Object -First 1

          if ($mpvRootCandidate) {
            $mpvRoot = $mpvRootCandidate.FullName
          } elseif (Test-Path (Join-Path $extractRoot "include\mpv\client.h")) {
            $mpvRoot = $extractRoot
          } else {
            Write-Error "Extracted mpv-dev SDK does not contain include\\mpv\\client.h"
            exit 1
          }

          $importLib = Get-ChildItem -Path $mpvRoot -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -in @("libmpv-2.lib", "mpv-2.lib", "libmpv.lib", "mpv.lib") } |
            Select-Object -First 1

          if (-not $importLib) {
            $mpvDll = Get-ChildItem -Path $mpvRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("libmpv-2.dll", "mpv-2.dll", "mpv.dll") } |
              Select-Object -First 1

            if (-not $mpvDll) {
              Write-Error "mpv-dev bundle has no import library and no runtime DLL to generate one from."
              exit 1
            }

            $libDir = Join-Path $mpvRoot "lib"
            if (-not (Test-Path $libDir)) {
              New-Item -ItemType Directory -Path $libDir | Out-Null
            }

            $exportsRaw = & dumpbin /exports $mpvDll.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "dumpbin failed while reading exports from $($mpvDll.FullName)"
              exit 1
            }

            $exportNames = New-Object System.Collections.Generic.List[string]
            foreach ($line in $exportsRaw) {
              if ($line -match "^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+(\S+)$") {
                $name = $matches[1]
                if ($name -and $name -ne "[NONAME]") {
                  $exportNames.Add($name)
                }
              }
            }

            if ($exportNames.Count -eq 0) {
              Write-Error "No exports parsed from $($mpvDll.FullName); cannot generate import library."
              exit 1
            }

            $defPath = Join-Path $libDir "libmpv-2.def"
            $defContent = @("LIBRARY libmpv-2.dll", "EXPORTS") + ($exportNames | Sort-Object -Unique)
            Set-Content -Path $defPath -Value $defContent -Encoding ascii

            $outLib = Join-Path $libDir "libmpv-2.lib"
            & lib /def:$defPath /machine:x64 /out:$outLib
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path $outLib)) {
              Write-Error "Failed to generate MSVC import library at $outLib"
              exit 1
            }

            Write-Host "Generated import library: $outLib"
          }

          "MPV_ROOT=$mpvRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using MPV_ROOT=$mpvRoot"

      - name: Cache sccache
        uses: actions/cache@v5
        with:
          path: .sccache
          key: ${{ runner.os }}-sccache-msvc2022-qt610-v2
          restore-keys: |
            ${{ runner.os }}-sccache-msvc2022-qt610-
            ${{ runner.os }}-sccache-

      - name: Setup sccache
        run: |
          $version = "v0.8.1"
          $url = "https://github.com/mozilla/sccache/releases/download/$version/sccache-$version-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile sccache.zip
          Expand-Archive sccache.zip -DestinationPath sccache
          echo "$PWD\sccache\sccache-$version-x86_64-pc-windows-msvc" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
          SCCACHE_CACHE_SIZE: "4G"
        shell: pwsh
        run: |
          sccache --start-server
          $installPrefix = [System.IO.Path]::GetFullPath((Join-Path $PWD "install-windows"))
          if (-Not (Test-Path build-windows)) {
            New-Item -ItemType Directory -Path build-windows
          }
          cd build-windows
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$installPrefix" -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build .
          cmake --install . --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $cacheFile = Join-Path $PWD "CMakeCache.txt"
          if (Test-Path $cacheFile) {
            $hasMpvHeaders = Select-String -Path $cacheFile -Pattern "^BLOOM_MPV_INCLUDE_DIR:PATH=.*$" | Select-Object -First 1
            $hasMpvLib = Select-String -Path $cacheFile -Pattern "^BLOOM_MPV_LIBRARY:FILEPATH=.*$" | Select-Object -First 1
            $mpvMissing = (($hasMpvHeaders -and $hasMpvHeaders.Line -match "NOTFOUND") -or ($hasMpvLib -and $hasMpvLib.Line -match "NOTFOUND") -or (-not $hasMpvHeaders) -or (-not $hasMpvLib))
            if ($mpvMissing) {
              Write-Error "libmpv SDK not detected during configure (BLOOM_MPV_INCLUDE_DIR/BLOOM_MPV_LIBRARY). Windows build requires direct libmpv support."
              exit 1
            }
          }
          if (Test-Path "$installPrefix\bin\Bloom.exe") {
            Write-Host "Installed Bloom.exe at $installPrefix\bin\Bloom.exe"
          } else {
            Write-Warning "Bloom.exe not found at expected install path: $installPrefix\bin\Bloom.exe"
            Get-ChildItem -Path "$installPrefix" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }
          sccache --show-stats
          sccache --stop-server

      - name: Package App
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -InstallDir install-windows -OutputDir Bloom-Windows

      - name: Verify libmpv Runtime Present
        shell: pwsh
        run: |
          $libmpv = Get-ChildItem -Path Bloom-Windows -Filter "*mpv*.dll" -File -Recurse -ErrorAction SilentlyContinue
          if (-not $libmpv) {
            Write-Error "No libmpv runtime DLL found in Bloom-Windows package. Windows playback policy requires bundled libmpv."
            exit 1
          }
          Write-Host "Found libmpv runtime: $($libmpv[0].Name)"

      - name: Install NSIS
        uses: ./.github/actions/setup-nsis

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: pwsh

      - name: Create ZIP Archive and Hash
        id: archive
        run: |
          Compress-Archive -Path Bloom-Windows/* -DestinationPath Bloom-Windows.zip -Force
          $zipHash = (Get-FileHash Bloom-Windows.zip -Algorithm SHA256).Hash
          echo "zip_hash=$zipHash" >> $env:GITHUB_OUTPUT
          echo "ZIP Hash: $zipHash"

          if (Test-Path "Bloom-Setup-0.5.2.exe") {
            $installerHash = (Get-FileHash Bloom-Setup-0.5.2.exe -Algorithm SHA256).Hash
            echo "installer_hash=$installerHash" >> $env:GITHUB_OUTPUT
            echo "Installer Hash: $installerHash"
          }
        shell: pwsh

      - name: Create Tagged Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Bloom ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: false
          files: |
            Bloom-Windows.zip
            Bloom-Setup-0.5.2.exe
          fail_on_unmatched_files: true

      - name: Trigger Scoop Bucket Update (Stable)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $payload = @{
            event_type = "update-stable-manifest"
            client_payload = @{
              hash = "${{ steps.archive.outputs.zip_hash }}"
              url = "https://github.com/crowquillx/Bloom/releases/download/$tag/Bloom-Windows.zip"
              version = $version
            }
          } | ConvertTo-Json -Compress
          
          curl.exe -X POST `
            -H "Accept: application/vnd.github+json" `
            -H "Authorization: Bearer ${{ secrets.SCOOP_REPO_TOKEN }}" `
            https://api.github.com/repos/crowquillx/scoop-bloom/dispatches `
            -d $payload

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Bloom-Windows-Portable
          path: Bloom-Windows.zip

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v6
        if: hashFiles('Bloom-Setup-0.5.2.exe') != ''
        with:
          name: Bloom-Windows-Installer
          path: Bloom-Setup-0.5.2.exe

  linux:
    name: Linux Build & Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libsecret-1-dev \
            libmpv-dev \
            libsqlite3-dev \
            libtiff-dev \
            libfuse2 \
            dpkg-dev \
            file \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools \
            qt6-multimedia-dev \
            qt6-shadertools-dev \
            qt6-5compat-dev \
            qt6-image-formats-plugins \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-wayland \
            qt6-wayland-dev

      - name: Export Qt environment
        run: |
          echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"
          echo "QT_PLUGIN_PATH=/usr/lib/x86_64-linux-gnu/qt6/plugins" >> "$GITHUB_ENV"
          echo "QML2_IMPORT_PATH=/usr/lib/x86_64-linux-gnu/qt6/qml" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install to staging directory
        run: |
          DESTDIR=${{ github.workspace }}/install-linux cmake --install build
          echo "=== Install tree ==="
          find ${{ github.workspace }}/install-linux -type f | head -50

      - name: Build .deb package
        env:
          INSTALL_DIR: ${{ github.workspace }}/install-linux/usr
          OUTPUT_DIR: ${{ github.workspace }}/artifacts
        run: |
          VERSION=$(date -u +%Y.%m.%d.%H%M)
          ./scripts/package-linux-deb.sh \
            --install-dir "$INSTALL_DIR" \
            --output-dir "$OUTPUT_DIR" \
            --version "$VERSION"

      - name: Create Linux tarball
        run: |
          cd ${{ github.workspace }}/install-linux
          tar -czf ${{ github.workspace }}/artifacts/Bloom-Linux.tar.gz .

      - name: Compute SHA256 hashes
        id: linux_hashes
        run: |
          cd ${{ github.workspace }}/artifacts
          echo "=== Linux Artifacts ==="
          ls -la

          DEB=$(ls bloom_*.deb 2>/dev/null | head -1)

          if [ -n "$DEB" ]; then
            DEB_HASH=$(sha256sum "$DEB" | cut -d' ' -f1)
            echo "deb_hash=$DEB_HASH" >> $GITHUB_OUTPUT
            echo "deb_name=$DEB" >> $GITHUB_OUTPUT
            echo ".deb SHA256: $DEB_HASH"
          fi

          TARBALL_HASH=$(sha256sum Bloom-Linux.tar.gz | cut -d' ' -f1)
          echo "tarball_hash=$TARBALL_HASH" >> $GITHUB_OUTPUT
          echo "Tarball SHA256: $TARBALL_HASH"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: Bloom-Linux-Deb
          path: artifacts/bloom_*.deb
          if-no-files-found: warn

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v6
        with:
          name: Bloom-Linux-Tarball
          path: artifacts/Bloom-Linux.tar.gz

      - name: Update tagged release with Linux artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Bloom ${{ github.ref_name }}
          prerelease: false
          files: |
            artifacts/bloom_*.deb
            artifacts/Bloom-Linux.tar.gz
          fail_on_unmatched_files: false

  publish-dev-release:
    name: Publish Rolling Dev Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v8
        with:
          name: Bloom-Windows-Portable
          path: dev-artifacts/windows

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: Bloom-Windows-Installer
          path: dev-artifacts/windows-installer

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: Bloom-Linux-Deb
          path: dev-artifacts/linux-deb

      - name: Download Linux tarball artifact
        uses: actions/download-artifact@v8
        with:
          name: Bloom-Linux-Tarball
          path: dev-artifacts/linux-tarball

      - name: Move dev-latest tag to current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f dev-latest "$GITHUB_SHA"
          git push origin refs/tags/dev-latest --force

      - name: Normalize dev release assets
        id: normalize_assets
        run: |
          set -euo pipefail

          mkdir -p release-assets

          cp dev-artifacts/windows/Bloom-Windows.zip release-assets/Bloom-Windows.zip
          cp dev-artifacts/windows-installer/Bloom-Setup-0.5.2.exe release-assets/Bloom-Setup-dev.exe

          DEB=$(find dev-artifacts/linux-deb -maxdepth 1 -type f -name 'bloom_*.deb' | head -1)
          TARBALL=$(find dev-artifacts/linux-tarball -maxdepth 1 -type f -name 'Bloom-Linux.tar.gz' | head -1)

          if [ -z "$DEB" ] || [ -z "$TARBALL" ]; then
            echo "Expected Linux artifacts were not downloaded correctly." >&2
            exit 1
          fi

          cp "$DEB" release-assets/bloom_dev_amd64.deb
          cp "$TARBALL" release-assets/Bloom-Linux.tar.gz

          WINDOWS_ZIP_HASH=$(sha256sum release-assets/Bloom-Windows.zip | cut -d' ' -f1)
          WINDOWS_INSTALLER_HASH=$(sha256sum release-assets/Bloom-Setup-dev.exe | cut -d' ' -f1)
          DEB_HASH=$(sha256sum release-assets/bloom_dev_amd64.deb | cut -d' ' -f1)
          TARBALL_HASH=$(sha256sum release-assets/Bloom-Linux.tar.gz | cut -d' ' -f1)

          {
            echo "windows_zip_hash=$WINDOWS_ZIP_HASH"
            echo "windows_installer_hash=$WINDOWS_INSTALLER_HASH"
            echo "deb_hash=$DEB_HASH"
            echo "tarball_hash=$TARBALL_HASH"
          } >> "$GITHUB_OUTPUT"

      - name: Build dev release notes
        run: |
          cat > dev-release-notes.md <<'EOF'
          Latest development build from main branch.

          ## Windows
          Portable ZIP (`Bloom-Windows.zip`)
          SHA256: `${{ steps.normalize_assets.outputs.windows_zip_hash }}`

          Installer (`Bloom-Setup-dev.exe`)
          SHA256: `${{ steps.normalize_assets.outputs.windows_installer_hash }}`

          ## Linux
          Debian package (`bloom_dev_amd64.deb`)
          SHA256: `${{ steps.normalize_assets.outputs.deb_hash }}`

          Tarball (`Bloom-Linux.tar.gz`)
          SHA256: `${{ steps.normalize_assets.outputs.tarball_hash }}`
          EOF

      - name: Remove existing dev release assets
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: 'dev-latest'
              });
            } catch (error) {
              if (error.status === 404) {
                core.info('dev-latest release does not exist yet; nothing to delete.');
                return;
              }
              throw error;
            }

            for (const asset of release.data.assets) {
              core.info(`Deleting stale asset ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              });
            }

      - name: Publish dev-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          target_commitish: ${{ github.sha }}
          name: Development Build
          body_path: dev-release-notes.md
          prerelease: true
          overwrite_files: true
          files: |
            release-assets/Bloom-Windows.zip
            release-assets/Bloom-Setup-dev.exe
            release-assets/bloom_dev_amd64.deb
            release-assets/Bloom-Linux.tar.gz
          fail_on_unmatched_files: true

      - name: Trigger Scoop Bucket Update (Dev)
        env:
          SCOOP_REPO_TOKEN: ${{ secrets.SCOOP_REPO_TOKEN }}
        run: |
          VERSION=$(date -u +%Y.%m.%d.%H%M)
          PAYLOAD=$(jq -cn \
            --arg hash "${{ steps.normalize_assets.outputs.windows_zip_hash }}" \
            --arg url "https://github.com/crowquillx/Bloom/releases/download/dev-latest/Bloom-Windows.zip" \
            --arg version "$VERSION" \
            '{event_type:"update-manifest",client_payload:{hash:$hash,url:$url,version:$version}}')

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $SCOOP_REPO_TOKEN" \
            https://api.github.com/repos/crowquillx/scoop-bloom/dispatches \
            -d "$PAYLOAD"
