name: CI and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bloom-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CACHIX_CACHE: crowquillx-bloom
  BLOOM_BUILD_JOBS: '2'

jobs:
  metadata:
    name: Determine build metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      channel: ${{ steps.metadata.outputs.channel }}
      build_id: ${{ steps.metadata.outputs.build_id }}
      git_sha: ${{ steps.metadata.outputs.git_sha }}
      is_tagged_release: ${{ steps.metadata.outputs.is_tagged_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve event metadata
        id: metadata
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\n' < VERSION)"
          if [[ "$REF" == refs/tags/v* ]]; then
            if [[ "$REF_NAME" != "v$VERSION" ]]; then
              echo "Tag $REF_NAME does not match VERSION ($VERSION)." >&2
              exit 1
            fi
            CHANNEL="stable"
            BUILD_ID="$VERSION"
            IS_TAGGED_RELEASE="true"
          else
            CHANNEL="dev"
            BUILD_ID="$(date -u +%Y%m%d%H%M%S)-${SHA::7}"
            IS_TAGGED_RELEASE="false"
          fi
          {
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "build_id=$BUILD_ID"
            echo "git_sha=$SHA"
            echo "is_tagged_release=$IS_TAGGED_RELEASE"
          } >> "$GITHUB_OUTPUT"

  nix:
    name: Nix build and validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Build checks and application
        run: |
          set -euo pipefail
          # cache.nixos.org nar downloads occasionally drop mid-transfer on
          # GitHub-hosted runners (broken pipe / HTTP 416 on resumed ranges),
          # which cascades through mpv/qtmultimedia and fails unrelated
          # derivations. Retry the whole nix invocation with backoff so a
          # transient substituter failure does not fail the run.
          retry() {
            local attempt=0 max=3 delay=20
            until "$@"; do
              attempt=$((attempt + 1))
              if [[ $attempt -ge $max ]]; then
                echo "::error::nix build failed after $attempt attempts: $*" >&2
                return 1
              fi
              echo "::warning::nix build attempt $attempt failed; retrying in ${delay}s: $*" >&2
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          retry nix build \
            .#checks.x86_64-linux.qml-lint \
            .#checks.x86_64-linux.metadata \
            .#checks.x86_64-linux.release-manifest \
            --print-build-logs --option max-jobs 1 --option cores 2
          retry nix build .#bloom --print-build-logs --option max-jobs 1 --option cores 2

  portable-linux:
    name: Portable Linux artifacts
    runs-on: ubuntu-24.04
    needs: [metadata, nix]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Validate Docker packaging environment
        run: |
          docker version
          image="$(jq -r .portable.image packaging/dependencies.json)"
          image="${image#docker://}"
          docker image inspect "$image" >/dev/null 2>&1 || docker pull "$image" >/dev/null
      - name: Build AppImage, deb, and tarball
        env:
          BLOOM_CONTAINER_ENGINE: docker
          BLOOM_BUILD_CHANNEL: ${{ needs.metadata.outputs.channel }}
          BLOOM_BUILD_ID: ${{ needs.metadata.outputs.build_id }}
          BLOOM_GIT_SHA: ${{ needs.metadata.outputs.git_sha }}
        run: nix run .#package-linux -- --output dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/SHA256SUMS-linux-x86_64.txt
          if-no-files-found: error

  flatpak:
    name: Flatpak artifact
    runs-on: ubuntu-24.04
    needs: [metadata, nix]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Enable Flatpak build sandbox
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          test "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns)" = 0
      - name: Validate Flatpak build sandbox
        run: |
          nix shell --inputs-from . nixpkgs#bubblewrap --command \
            bwrap --unshare-user --unshare-net --ro-bind / / true
      - name: Build Flatpak bundle
        env:
          BLOOM_BUILD_CHANNEL: ${{ needs.metadata.outputs.channel }}
          BLOOM_BUILD_ID: ${{ needs.metadata.outputs.build_id }}
          BLOOM_GIT_SHA: ${{ needs.metadata.outputs.git_sha }}
        run: nix run .#package-flatpak -- --output dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Flatpak
          path: |
            dist/*.flatpak
            dist/SHA256SUMS-flatpak-x86_64.txt
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-2025
    needs: metadata
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
      - name: Read dependency pins
        shell: pwsh
        run: |
          $deps = Get-Content packaging/dependencies.json -Raw | ConvertFrom-Json
          "BLOOM_QT_VERSION=$($deps.qt.version)" >> $env:GITHUB_ENV
          "BLOOM_QT_ARCH=$($deps.qt.windows_arch)" >> $env:GITHUB_ENV
      - name: Cache Qt SDK
        id: cache-qt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.tool_cache }}\Qt
          key: qt-${{ env.BLOOM_QT_VERSION }}-${{ env.BLOOM_QT_ARCH }}-${{ hashFiles('packaging/dependencies.json') }}
      - name: Install Qt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # aqtinstall 3.3.0 cannot install Qt 6.11+ on Windows (repo layout
          # changed); use the fix on master until 3.3.1 is released.
          python -m pip install "aqtinstall @ git+https://github.com/miurahr/aqtinstall.git@bbfb1f7c0590b9eb3fa91356e75bb64fb15d3643" "py7zr==1.0.*"
          python -m aqt install-qt -O "$env:RUNNER_TOOL_CACHE\Qt" windows desktop `
            "$env:BLOOM_QT_VERSION" "$env:BLOOM_QT_ARCH" `
            -m qtmultimedia qtshadertools qtimageformats qt5compat
      - name: Configure Qt environment
        shell: pwsh
        run: |
          # aqtinstall installs to <outputdir>/<version>/<arch-dir>/ where
          # <arch-dir> drops the "win64_" prefix from the package selector.
          $qtArchDir = $env:BLOOM_QT_ARCH -replace '^win64_', ''
          $qtRoot = Join-Path $env:RUNNER_TOOL_CACHE "Qt\$env:BLOOM_QT_VERSION\$qtArchDir"
          if (-not (Test-Path "$qtRoot\lib\cmake\Qt6\Qt6Config.cmake")) {
            throw "Qt6Config.cmake not found under $qtRoot"
          }
          "QT_ROOT_DIR=$qtRoot" >> $env:GITHUB_ENV
          "CMAKE_PREFIX_PATH=$qtRoot" >> $env:GITHUB_ENV
          "$qtRoot\bin" >> $env:GITHUB_PATH
      - name: Install build tools
        shell: pwsh
        run: choco install ninja 7zip -y --no-progress
      - name: Build and install
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio installation with MSVC x64 tools was found" }
          $devShell = Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          if (-not (Test-Path $devShell)) { throw "VS DevShell module not found at $devShell" }
          Import-Module $devShell
          Enter-VsDevShell -VsInstallPath $vsPath -Arch x64 -HostArch x64 -SkipAutomaticLocation
          if (-not (Get-Command cl -ErrorAction SilentlyContinue)) { throw "MSVC compiler (cl.exe) is not on PATH after Enter-VsDevShell" }
          ./scripts/build.ps1 -BuildDir build-windows -InstallDir install-windows `
            -QtDir "$env:QT_ROOT_DIR" -Generator Ninja `
            -BuildChannel "${{ needs.metadata.outputs.channel }}" `
            -BuildId "${{ needs.metadata.outputs.build_id }}" `
            -GitSha "${{ needs.metadata.outputs.git_sha }}" -Clean
      - name: Package portable build
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 -InstallDir install-windows `
            -OutputDir Bloom-Windows -QtDir "$env:QT_ROOT_DIR"
          Compress-Archive Bloom-Windows/* Bloom-Windows.zip -Force
      - uses: ./.github/actions/setup-nsis
      - name: Build installer
        shell: pwsh
        run: '& "$env:BLOOM_NSIS_EXE" installer.nsi'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Bloom-Windows
          path: |
            Bloom-Windows.zip
            Bloom-Setup-*.exe
          if-no-files-found: error

  release:
    name: Publish release artifacts
    runs-on: ubuntu-24.04
    needs: [metadata, portable-linux, flatpak, windows]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    concurrency:
      group: bloom-release-publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: Bloom-*
          path: release-assets
          merge-multiple: true
      - name: Prepare release metadata and assets
        id: release
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          BUILD_ID: ${{ needs.metadata.outputs.build_id }}
          IS_TAGGED_RELEASE: ${{ needs.metadata.outputs.is_tagged_release }}
        run: |
          set -euo pipefail
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "$IS_TAGGED_RELEASE" == "true" ]]; then
            TAG="$GITHUB_REF_NAME"
            RELEASE_NAME="Bloom $GITHUB_REF_NAME"
            NOTES_FILE="RELEASE_NOTES.md"
            INSTALLER="$(find release-assets -maxdepth 1 -name 'Bloom-Setup-*.exe' -printf '%f\n' | head -1)"
            PRERELEASE="false"
            MAKE_LATEST="true"
          else
            TAG="dev-latest"
            RELEASE_NAME="Development Build"
            PRERELEASE="true"
            MAKE_LATEST="false"
            mv release-assets/Bloom-Setup-*.exe release-assets/Bloom-Setup-dev.exe
            mv release-assets/Bloom-*-linux-x86_64.AppImage release-assets/Bloom-x86_64.AppImage
            mv release-assets/Bloom-*-linux-x86_64.flatpak release-assets/Bloom-x86_64.flatpak
            mv release-assets/Bloom-*-linux-x86_64.tar.gz release-assets/Bloom-Linux.tar.gz
            mv release-assets/bloom_*_amd64.deb release-assets/bloom_dev_amd64.deb
            (
              cd release-assets
              sha256sum \
                Bloom-x86_64.AppImage \
                Bloom-Linux.tar.gz \
                bloom_dev_amd64.deb > SHA256SUMS-linux-x86_64.txt
              sha256sum Bloom-x86_64.flatpak > SHA256SUMS-flatpak-x86_64.txt
            )
            INSTALLER="Bloom-Setup-dev.exe"
            NOTES_FILE="dev-release-notes.md"
            cat > "$NOTES_FILE" <<EOF
          Latest development build from the \`main\` branch.

          - Build ID: \`$BUILD_ID\`
          - Commit: \`$GITHUB_SHA\`
          - Base version: \`$VERSION\`
          - Built: \`$PUBLISHED_AT\`
          EOF
            git tag -f dev-latest "$GITHUB_SHA"
            git push origin refs/tags/dev-latest --force
          fi
          {
            echo "tag=$TAG"
            echo "name=$RELEASE_NAME"
            echo "prerelease=$PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
            echo "notes_file=$NOTES_FILE"
            echo "installer=$INSTALLER"
            echo "published_at=$PUBLISHED_AT"
          } >> "$GITHUB_OUTPUT"
      - name: Generate combined checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 |
            sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.flatpak
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.exe
      - name: Remove previous development release
        if: needs.metadata.outputs.is_tagged_release != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: "dev-latest"
              });
            } catch (error) {
              if (error.status === 404) {
                core.info("dev-latest release does not exist yet.");
                return;
              }
              throw error;
            }
            core.info(`Deleting previous dev-latest release ${release.data.id}`);
            await github.rest.repos.deleteRelease({
              owner,
              repo,
              release_id: release.data.id
            });
      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body_path: ${{ steps.release.outputs.notes_file }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          overwrite_files: true
          files: release-assets/*
          fail_on_unmatched_files: true
      - name: Generate Windows update manifest
        id: manifest
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          CHANNEL: ${{ needs.metadata.outputs.channel }}
          BUILD_ID: ${{ needs.metadata.outputs.build_id }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          INSTALLER: ${{ steps.release.outputs.installer }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
        run: |
          PORTABLE="Bloom-Windows.zip"
          INSTALLER_HASH="$(sha256sum "release-assets/$INSTALLER" | cut -d' ' -f1)"
          PORTABLE_HASH="$(sha256sum "release-assets/$PORTABLE" | cut -d' ' -f1)"
          python3 scripts/generate-update-manifest.py \
            --channel "$CHANNEL" \
            --version "$VERSION" \
            --build-id "$BUILD_ID" \
            --release-tag "$RELEASE_TAG" \
            --published-at "$PUBLISHED_AT" \
            --notes-file "$NOTES_FILE" \
            --installer-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/$INSTALLER" \
            --installer-filename "$INSTALLER" \
            --installer-sha256 "$INSTALLER_HASH" \
            --portable-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/$PORTABLE" \
            --portable-filename "$PORTABLE" \
            --portable-sha256 "$PORTABLE_HASH" \
            --minimum-supported-version "$VERSION" \
            --output "$CHANNEL.json"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
      - name: Publish update manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" manifest-repo
          cd manifest-repo
          if git ls-remote --exit-code --heads origin update-manifests >/dev/null 2>&1; then
            git checkout update-manifests
          else
            git checkout --orphan update-manifests
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "../${{ steps.manifest.outputs.channel }}.json" .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.manifest.outputs.channel }}.json"
          git commit -m "chore: update ${{ steps.manifest.outputs.channel }} manifest" || true
          git push origin update-manifests
      - name: Update Scoop manifest
        env:
          SCOOP_REPO_TOKEN: ${{ secrets.SCOOP_REPO_TOKEN }}
          CHANNEL: ${{ needs.metadata.outputs.channel }}
          VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
        run: |
          set -euo pipefail
          if [[ -z "$SCOOP_REPO_TOKEN" ]]; then
            echo "SCOOP_REPO_TOKEN is required to update crowquillx/scoop-bloom." >&2
            exit 1
          fi

          ZIP="Bloom-Windows.zip"
          ZIP_HASH="$(sha256sum "release-assets/$ZIP" | cut -d' ' -f1)"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ZIP}"

          if [[ "$CHANNEL" == "stable" ]]; then
            EVENT_TYPE="update-stable-manifest"
            SCOOP_VERSION="$VERSION"
          else
            EVENT_TYPE="update-manifest"
            SCOOP_VERSION="$(date -u -d "$PUBLISHED_AT" +%Y.%m.%d.%H%M)"
          fi

          PAYLOAD="$(jq -cn \
            --arg event_type "$EVENT_TYPE" \
            --arg hash "$ZIP_HASH" \
            --arg url "$ZIP_URL" \
            --arg version "$SCOOP_VERSION" \
            '{event_type:$event_type,client_payload:{hash:$hash,url:$url,version:$version}}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $SCOOP_REPO_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/crowquillx/scoop-bloom/dispatches" \
            --data "$PAYLOAD"
