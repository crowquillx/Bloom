name: Update dependencies

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
      - name: Refresh flake inputs
        run: nix flake update
      - name: Validate updated inputs
        env:
          BLOOM_BUILD_JOBS: '2'
        run: |
          nix build \
            .#checks.x86_64-linux.qml-lint \
            .#checks.x86_64-linux.metadata \
            .#checks.x86_64-linux.release-manifest \
            .#bloom \
            --print-build-logs --option max-jobs 1 --option cores 2
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ github.token }}
          branch: automation/update-dependencies
          delete-branch: true
          commit-message: 'chore(deps): update pinned dependencies'
          title: 'chore(deps): update pinned dependencies'
          body: |
            Weekly dependency refresh.

            The flake lock was updated and the build plus non-test validation passed.
            Portable, Flatpak, Windows, and GitHub Actions pins remain explicit
            in `packaging/dependencies.json` and Dependabot.
          labels: dependencies
